{% extends "base.html" %}
{% block content %}
<section style="min-height:80vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:1.5rem;">
    <div class="glass" style="padding:2.5rem 3rem; border-radius:20px; text-align:center; max-width:400px;">
        <div style="font-size:2.5rem; margin-bottom:1rem;">🔐</div>
        <h2 style="color:#fff; margin-bottom:.5rem;">Completing Sign-In…</h2>
        <p style="color:var(--text-muted); font-size:.95rem;">Please wait while we verify your Google account.</p>
        <div style="margin-top:1.5rem; display:flex; justify-content:center; gap:.4rem;">
            <span style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce 1s infinite 0s;display:inline-block;"></span>
            <span style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce 1s infinite .2s;display:inline-block;"></span>
            <span style="width:10px;height:10px;border-radius:50%;background:var(--primary);animation:bounce 1s infinite .4s;display:inline-block;"></span>
        </div>
    </div>
</section>
<style>
@keyframes bounce { 0%,80%,100%{transform:scale(0)} 40%{transform:scale(1)} }
</style>
<script>
// After Clerk processes the OAuth callback, extract user info and sync with Flask
(async function() {
    const CLERK_PK = "{{ config.get('CLERK_PUBLISHABLE_KEY', '') }}";
    if (!CLERK_PK) { window.location.href = '/login'; return; }

    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js';
    script.setAttribute('data-clerk-publishable-key', CLERK_PK);
    document.head.appendChild(script);

    script.onload = async () => {
        const clerk = window.Clerk;
        await clerk.load();
        await clerk.handleRedirectCallback();

        const user = clerk.user;
        if (!user) { window.location.href = '/login'; return; }

        const profileData = {
            name: user.fullName || user.firstName || "User",
            email: user.primaryEmailAddress?.emailAddress || "",
        };

        const res = await fetch('/api/auth/google', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(profileData)
        });
        const data = await res.json();
        window.location.href = data.success ? data.redirect : '/login';
    };
})();
</script>
{% endblock %}
