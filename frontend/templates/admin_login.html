{% extends "base.html" %}
{% block content %}

<section class="auth-section">
    <div class="auth-container auth-container--login">
        <div class="auth-card auth-card--admin">
            <div class="auth-header">
                <div class="auth-icon">🛡</div>
                <h1>Admin Login</h1>
                <p>Restricted access – authorised personnel only</p>
            </div>

            <form action="{{ url_for('main.admin_login') }}" method="POST" class="auth-form">
                <div class="form-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                        placeholder="Enter admin username" required autofocus />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-control"
                            placeholder="Enter admin password" required />
                        <button type="button" class="toggle-pw" data-target="password">👁</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login to Admin Panel →</button>
            </form>

            <div class="auth-footer">
                <p>Default credentials → username: <code>admin</code> &nbsp;|&nbsp; password: <code>admin123</code></p>
                <p style="margin-top:.5rem;"><a href="{{ url_for('main.index') }}">← Back to Home</a></p>
            </div>
        </div>
    </div>
</section>

{% endblock %}
