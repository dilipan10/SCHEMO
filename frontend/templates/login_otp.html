{% extends "base.html" %}
{% block content %}

<section class="auth-section" style="padding:5rem 1.5rem 3rem;min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="auth-card glass" style="max-width:450px;width:100%;margin:0 auto;">
        <div class="auth-header" style="text-align:center;">
            <div style="width:64px;height:64px;margin:0 auto 1.5rem;background:linear-gradient(135deg,#10b981,#059669);border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="shield-check" style="width:32px;height:32px;color:#fff;"></i>
            </div>
            <h1>Two-Factor Authentication</h1>
            <p style="color:var(--text-muted);margin-top:.75rem;">
                Enter the 6-digit code sent to<br>
                <strong style="color:#fff;">+91 {{ phone[-4:].rjust(10, '*') if phone else '****' }}</strong>
            </p>
        </div>

        <form action="{{ url_for('main.login') }}" method="POST" class="auth-form" style="margin-top:2rem;">
            <input type="hidden" name="otp_step" value="verify">
            
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" name="otp" class="form-control"
                    placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                    required autofocus autocomplete="one-time-code"
                    style="text-align:center;font-size:1.5rem;letter-spacing:.5rem;font-weight:700;" />
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:1.5rem;">
                Verify & Login <i data-lucide="log-in"></i>
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--glass-border);">
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.75rem;">
                Didn't receive the code?
            </p>
            <button type="button" class="btn btn-outline btn-sm" onclick="alert('Resend feature coming soon')">
                <i data-lucide="refresh-cw"></i> Resend OTP
            </button>
        </div>

        <div class="auth-footer" style="margin-top:1.5rem;">
            <a href="{{ url_for('main.login') }}" style="color:var(--text-muted);font-size:.9rem;">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to login
            </a>
        </div>
    </div>
</section>

<script>
const otpInput = document.getElementById('otp');
otpInput.addEventListener('input', function(e) {
    this.value = this.value.replace(/[^0-9]/g, '');
    if (this.value.length === 6) {
        setTimeout(() => this.form.submit(), 300);
    }
});
</script>

{% endblock %}
