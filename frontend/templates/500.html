{% extends "base.html" %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:7rem;font-weight:900;background:linear-gradient(135deg,#EF4444,#F97316);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:1rem;">500</div>
    <h2 style="color:#fff;font-size:1.75rem;font-weight:800;margin-bottom:.75rem;">Something Went Wrong</h2>
    <p style="color:var(--text-muted);max-width:420px;margin:0 auto 2rem;">Our server hit an unexpected error. Please try again in a moment.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary"><i data-lucide="home"></i> Go Home</a>
      <button onclick="window.location.reload()" class="btn btn-outline"><i data-lucide="refresh-cw"></i> Try Again</button>
    </div>
  </div>
</section>
{% endblock %}
