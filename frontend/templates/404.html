{% extends "base.html" %}
{% block content %}
<section style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;">
  <div>
    <div style="font-size:7rem;font-weight:900;background:linear-gradient(135deg,var(--primary-light),var(--accent-light));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;line-height:1;margin-bottom:1rem;">404</div>
    <h2 style="color:#fff;font-size:1.75rem;font-weight:800;margin-bottom:.75rem;">Page Not Found</h2>
    <p style="color:var(--text-muted);max-width:400px;margin:0 auto 2rem;">The page you're looking for doesn't exist or has been moved.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{{ url_for('main.index') }}" class="btn btn-primary"><i data-lucide="home"></i> Go Home</a>
      <a href="{{ url_for('main.schemes') }}" class="btn btn-outline"><i data-lucide="list"></i> Browse Schemes</a>
    </div>
  </div>
</section>
{% endblock %}
