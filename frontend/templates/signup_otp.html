{% extends "base.html" %}
{% block content %}

<section class="auth-section" style="padding:5rem 1.5rem 3rem;min-height:100vh;display:flex;align-items:center;justify-content:center;">
    <div class="auth-card glass" style="max-width:450px;width:100%;margin:0 auto;">
        <div class="auth-header" style="text-align:center;">
            <div style="width:64px;height:64px;margin:0 auto 1.5rem;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;">
                <i data-lucide="smartphone" style="width:32px;height:32px;color:#fff;"></i>
            </div>
            <h1>Verify Your Phone</h1>
            <p style="color:var(--text-muted);margin-top:.75rem;">
                We've sent a 6-digit OTP to<br>
                <strong style="color:#fff;">+91 {{ phone }}</strong>
            </p>
        </div>

        <form action="{{ url_for('main.signup') }}" method="POST" class="auth-form" style="margin-top:2rem;">
            <input type="hidden" name="otp_step" value="verify">
            
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" name="otp" class="form-control"
                    placeholder="000000" maxlength="6" pattern="[0-9]{6}"
                    required autofocus autocomplete="one-time-code"
                    style="text-align:center;font-size:1.5rem;letter-spacing:.5rem;font-weight:700;" />
                <small style="color:var(--text-muted);font-size:.85rem;margin-top:.5rem;display:block;">
                    Check your SMS inbox for the code
                </small>
            </div>

            {% if dev_otp %}
            <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:1rem;text-align:center;margin-top:.5rem;">
                <p style="color:#F59E0B;font-size:.8rem;font-weight:600;margin-bottom:.4rem;">⚠️ SMS not configured — Dev Mode OTP:</p>
                <span style="font-size:2rem;font-weight:800;color:#fff;letter-spacing:.5rem;">{{ dev_otp }}</span>
            </div>
            {% endif %}

            <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:1.5rem;">
                Verify & Create Account <i data-lucide="check-circle"></i>
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--glass-border);">
            <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:.75rem;">
                Didn't receive the code?
            </p>
            <button type="button" class="btn btn-outline btn-sm" id="resendBtn" onclick="resendOTP()">
                <i data-lucide="refresh-cw"></i> Resend OTP
            </button>
        </div>

        <div class="auth-footer" style="margin-top:1.5rem;">
            <a href="{{ url_for('main.signup') }}" style="color:var(--text-muted);font-size:.9rem;">
                <i data-lucide="arrow-left" style="width:14px;height:14px;"></i> Back to signup
            </a>
        </div>
    </div>
</section>

<script>
// Auto-focus and auto-submit on 6 digits
const otpInput = document.getElementById('otp');
otpInput.addEventListener('input', function(e) {
    // Only allow digits
    this.value = this.value.replace(/[^0-9]/g, '');
    
    // Auto-submit when 6 digits entered
    if (this.value.length === 6) {
        setTimeout(() => this.form.submit(), 300);
    }
});

// Resend OTP (reload signup page to regenerate)
function resendOTP() {
    const btn = document.getElementById('resendBtn');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader" style="animation:spin 1s linear infinite;"></i> Sending...';
    
    // In production, call an API endpoint to resend
    // For now, just reload after 2 seconds
    setTimeout(() => {
        window.location.href = "{{ url_for('main.signup') }}";
    }, 2000);
}

// Countdown timer (optional)
let countdown = 60;
const timer = setInterval(() => {
    countdown--;
    if (countdown <= 0) {
        clearInterval(timer);
        document.getElementById('resendBtn').disabled = false;
    }
}, 1000);
</script>

<style>
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
</style>

{% endblock %}
