{% extends "base.html" %}
{% block content %}
<section class="auth-section" style="padding:5rem 1.5rem 3rem;min-height:100vh;display:flex;align-items:center;justify-content:center;">
<div class="auth-card glass" style="max-width:460px;width:100%;border-radius:20px;padding:2.5rem;">

  <div style="margin-bottom:1.5rem;">
    <a href="{{ url_for('main.profile_edit') }}" style="display:inline-flex;align-items:center;gap:.5rem;color:var(--text-muted);font-size:.9rem;">
      <i data-lucide="arrow-left" style="width:16px;height:16px;"></i> Back to Profile
    </a>
  </div>

  <div class="auth-header" style="text-align:center;margin-bottom:2rem;">
    <div style="width:60px;height:60px;margin:0 auto 1rem;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:50%;display:flex;align-items:center;justify-content:center;">
      <i data-lucide="key" style="width:28px;height:28px;color:#fff;"></i>
    </div>
    <h1>Change Password</h1>
    <p style="color:var(--text-muted);margin-top:.5rem;">Keep your account secure with a strong password.</p>
  </div>

  {% if is_google_user %}
  <div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.3);border-radius:12px;padding:1.25rem;text-align:center;">
    <p style="color:#F59E0B;font-size:.9rem;">You signed in with Google. Password management is handled by Google.</p>
  </div>
  {% else %}
  <form action="{{ url_for('main.change_password') }}" method="POST" class="auth-form">
    <div class="form-group">
      <label for="current_password">Current Password</label>
      <div class="input-wrapper">
        <input type="password" id="current_password" name="current_password" class="form-control" required placeholder="Enter current password">
        <button type="button" class="toggle-pw" onclick="togglePw('current_password')"><i data-lucide="eye"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label for="new_password">New Password</label>
      <div class="input-wrapper">
        <input type="password" id="new_password" name="new_password" class="form-control" required placeholder="Min 6 characters" minlength="6">
        <button type="button" class="toggle-pw" onclick="togglePw('new_password')"><i data-lucide="eye"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label for="confirm_password">Confirm New Password</label>
      <div class="input-wrapper">
        <input type="password" id="confirm_password" name="confirm_password" class="form-control" required placeholder="Repeat new password">
        <button type="button" class="toggle-pw" onclick="togglePw('confirm_password')"><i data-lucide="eye"></i></button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:1rem;padding:.9rem;">
      <i data-lucide="shield-check"></i> Update Password
    </button>
  </form>
  {% endif %}
</div>
</section>
<script>
function togglePw(id) {
  const inp = document.getElementById(id);
  const icon = inp.nextElementSibling.querySelector('i');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  icon.setAttribute('data-lucide', inp.type === 'password' ? 'eye' : 'eye-off');
  lucide.createIcons();
}
</script>
{% endblock %}
