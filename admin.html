<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schemo - Admin Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">Schemo</h2>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="signup.html">Signup</a></li>
                <li><a href="admin.html" class="active">Admin</a></li>
            </ul>
        </div>
    </nav>

    <!-- Admin Login Form Section -->
    <section class="form-section">
        <div class="form-container">
            <h2>Admin Login</h2>
            <form id="adminForm">
                <!-- Admin Email Input -->
                <div class="form-group">
                    <label for="adminEmail">Admin Email</label>
                    <input type="email" id="adminEmail" placeholder="Enter admin email" required>
                </div>

                <!-- Password Input -->
                <div class="form-group">
                    <label for="adminPassword">Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter admin password" required>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn-primary">Admin Login</button>
            </form>

            <!-- Link to User Login -->
            <p class="form-footer">Not an admin? <a href="login.html">User login here</a></p>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Schemo. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
